---
- name: deploy systemd unit
  ansible.builtin.template:
    src: certplane-broker.service.j2
    dest: /etc/systemd/system/certplane-broker.service
    owner: root
    group: root
    mode: "0644"
  notify: restart certplane-broker

- name: enable and start certplane-broker
  ansible.builtin.systemd:
    name: certplane-broker
    enabled: true
    state: started
    daemon_reload: true
