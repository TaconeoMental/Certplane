---
- name: create config directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ certplane_agent_group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ certplane_agent_config_dir }}", mode: "0755" }
    - { path: "{{ certplane_agent_config_dir }}/ca", mode: "0755" }
    - { path: "{{ certplane_agent_state_dir }}", owner: "{{ certplane_agent_user }}", mode: "0750" }

- name: deploy issuer CA bundle
  ansible.builtin.copy:
    src: "{{ certplane_agent_issuer_ca_bundle_src }}"
    dest: "{{ certplane_agent_config_dir }}/ca/agent-identity-ca-bundle.crt"
    owner: root
    group: "{{ certplane_agent_group }}"
    mode: "0644"

- name: deploy broker CA bundle
  ansible.builtin.copy:
    src: "{{ certplane_agent_broker_ca_bundle_src }}"
    dest: "{{ certplane_agent_config_dir }}/ca/broker-server-ca-bundle.crt"
    owner: root
    group: "{{ certplane_agent_group }}"
    mode: "0644"

- name: deploy step-ca root CA bundle
  ansible.builtin.copy:
    src: "{{ certplane_agent_step_ca_root_ca_bundle_src }}"
    dest: "{{ certplane_agent_config_dir }}/ca/step-ca-root.crt"
    owner: root
    group: "{{ certplane_agent_group }}"
    mode: "0644"
  when: certplane_agent_step_ca_root_ca_bundle_src is defined

- name: deploy agent config
  ansible.builtin.template:
    src: agent.yml.j2
    dest: "{{ certplane_agent_config_dir }}/agent.yml"
    owner: root
    group: "{{ certplane_agent_group }}"
    mode: "0640"
